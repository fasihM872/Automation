{# Pitch email. Inline styles only — email clients ignore <style> blocks. #}
<div style="font-family: Arial, Helvetica, sans-serif; color:#222222; max-width:560px; margin:0 auto; line-height:1.6; font-size:15px;">
  {% for p in intro_paragraphs %}
  <p style="margin:0 0 14px;">{{ p|safe }}</p>
  {% endfor %}

  {% if preview_src %}
  <p style="margin:18px 0;">
    <a href="{{ template_url }}" target="_blank" rel="noopener">
      <img src="{{ preview_src }}" alt="{{ template_name }} preview"
           style="width:100%; max-width:560px; border:1px solid #e3e3e3; border-radius:8px;">
    </a>
  </p>
  {% endif %}

  <p style="margin:22px 0;">
    <a href="{{ template_url }}" target="_blank" rel="noopener"
       style="background:#1d9e75; color:#ffffff; text-decoration:none; padding:12px 22px;
              border-radius:8px; display:inline-block; font-weight:bold;">
      View the {{ template_name }} demo
    </a>
  </p>

  <p style="margin:0 0 14px;">
    If it looks like a fit, just reply to this email and I'll get your site built.
    Happy to adjust colours, text or layout to match your brand.
  </p>

  <p style="margin:24px 0 0; color:#555555;">&mdash; {{ sender_name }}<br>{{ sender_email }}</p>

  <hr style="border:none; border-top:1px solid #eeeeee; margin:24px 0 12px;">
  <p style="font-size:12px; color:#999999; margin:0;">
    You received this because your business is publicly listed. Reply with "STOP" and I won't contact you again.
  </p>
  {% if tracking_pixel_url %}
  <img src="{{ tracking_pixel_url }}" alt="" width="1" height="1"
       style="display:block; width:1px; height:1px; border:0; opacity:0;">
  {% endif %}
</div>
