<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>musharp B2B Email Outreach Templates Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0F172A;
      --panel-color: #1E293B;
      --panel-hover: #334155;
      --text-color: #F8FAFC;
      --text-muted: #94A3B8;
      --border-color: #334155;
      --accent-color: #0D9488;
      --accent-glow: rgba(13, 148, 136, 0.15);
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    header {
      background-color: var(--panel-color);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background-color: rgba(30, 41, 59, 0.9);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      background-color: var(--accent-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #FFFFFF;
      font-size: 18px;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .brand-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand-title span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 16px;
      margin-left: 6px;
    }

    .badge {
      background-color: var(--accent-glow);
      color: var(--accent-color);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-transform: capitalize;
      transition: all 0.3s ease;
      margin-left: 12px;
    }

    .actions {
      display: flex;
      gap: 16px;
    }

    .btn {
      background-color: var(--accent-color);
      color: #FFFFFF;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
      opacity: 0.95;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      box-shadow: none;
    }

    /* Tab Switcher Area */
    .tabs-container {
      background-color: rgba(15, 23, 42, 0.6);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 32px;
      display: flex;
      justify-content: center;
      gap: 12px;
      overflow-x: auto;
      sticky: top;
      top: 69px;
      z-index: 99;
    }

    .tab-btn {
      background-color: var(--panel-color);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      padding: 10px 20px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s ease;
    }

    .tab-btn:hover {
      background-color: var(--panel-hover);
      color: var(--text-color);
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background-color: var(--accent-glow);
      border-color: var(--accent-color);
      color: #FFFFFF;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .tab-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    main {
      padding: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .preview-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .preview-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-title span {
      background-color: var(--panel-color);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid var(--border-color);
    }

    .device-frame {
      background-color: var(--panel-color);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-color);
      transition: border-color 0.3s ease;
    }

    .device-header {
      height: 36px;
      background-color: var(--panel-color);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 6px;
      border-bottom: 1px solid var(--border-color);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #FF5F56;
    }
    .dot:nth-child(2) { background-color: #FFBD2E; }
    .dot:nth-child(3) { background-color: #27C93F; }

    iframe {
      border: none;
      background-color: #F8FAFC;
    }

    .mobile-frame {
      width: 375px;
      height: 720px;
      border-radius: 36px;
    }
    
    .mobile-frame iframe {
      width: 100%;
      height: 100%;
    }

    .desktop-frame {
      width: 760px;
      height: 720px;
      border-radius: 12px;
    }

    .desktop-frame iframe {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-logo" id="logo-icon">D</div>
      <div class="brand-title" id="preview-title">musharp Dental Clinic<span>Pitch Email Outreach Preview</span></div>
      <div class="badge" id="theme-badge">clinical teal theme</div>
    </div>
    <div class="actions">
      <a href="dentist.html" target="_blank" id="raw-link" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle;"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        Open Template Raw
      </a>
    </div>
  </header>

  <!-- Niche Switcher Tabs -->
  <div class="tabs-container">
    <button class="tab-btn active" onclick="switchNiche('dentist')" data-niche="dentist">
      <!-- Tooth SVG Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 2C9.5 2 7 3.5 6 6c-1 2.5-.5 5.5.5 7.5.5 1 1 2 1.5 3 .5 1 .5 2 .5 2.5 0 1.5 1 2.5 2.5 2.5 1 0 1.5-.5 2-1 .5.5 1 1 2 1 1.5 0 2.5-1 2.5-2.5 0-.5 0-1.5.5-2.5.5-1 1-2 1.5-3 1-2 1.5-5 .5-7.5-1-2.5-3.5-4-6-4zM9.5 7.5c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5z"/>
      </svg>
      Dentist
    </button>
    <button class="tab-btn" onclick="switchNiche('plumbing')" data-niche="plumbing">
      <!-- Wrench SVG Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 1 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"/>
      </svg>
      Plumbing
    </button>
    <button class="tab-btn" onclick="switchNiche('hospital')" data-niche="hospital">
      <!-- Medical Cross SVG Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M19 10.5h-5.5V5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v5.5H5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5h5.5V19c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-5.5H19c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z"/>
      </svg>
      Hospital
    </button>
    <button class="tab-btn" onclick="switchNiche('pharmacy')" data-niche="pharmacy">
      <!-- Rx Capsule SVG Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M6 3h12c1.66 0 3 1.34 3 3v12c0 1.66-1.34 3-3 3H6c-1.66 0-3-1.34-3-3V6c0-1.66 1.34-3 3-3zm5.5 4h-3v3H7v3h1.5v3h3v-3H13v-3h-1.5V7zm5.5 0h-3v10h3V7z"/>
      </svg>
      Pharmacy
    </button>
    <button class="tab-btn" onclick="switchNiche('care_homes')" data-niche="care_homes">
      <!-- Heart SVG Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      Care Homes
    </button>
  </div>

  <main>
    <!-- Desktop Preview -->
    <div class="preview-container">
      <div class="preview-title">
        Desktop View <span>680px fixed width</span>
      </div>
      <div class="device-frame desktop-frame" id="desktop-frame">
        <div class="device-header">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <iframe id="desktop-iframe" src="dentist.html"></iframe>
      </div>
    </div>

    <!-- Mobile Preview -->
    <div class="preview-container">
      <div class="preview-title">
        Mobile View <span>Responsive collapse (375px)</span>
      </div>
      <div class="device-frame mobile-frame" id="mobile-frame">
        <div class="device-header">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <iframe id="mobile-iframe" src="dentist.html"></iframe>
      </div>
    </div>
  </main>

  <script>
    const niches = {
      dentist: {
        name: 'Dental Clinic',
        file: 'dentist.html',
        color: '#0D9488',
        logo: 'D',
        badge: 'clinical teal',
        glow: 'rgba(13, 148, 136, 0.2)'
      },
      plumbing: {
        name: 'Plumbing',
        file: 'plumbing.html',
        color: '#0284C7',
        logo: 'P',
        badge: 'water blue',
        glow: 'rgba(2, 130, 199, 0.2)'
      },
      hospital: {
        name: 'Hospital',
        file: 'hospital.html',
        color: '#2563EB',
        logo: 'H',
        badge: 'trust blue',
        glow: 'rgba(37, 99, 235, 0.2)'
      },
      pharmacy: {
        name: 'Pharmacy',
        file: 'pharmacy.html',
        color: '#16A34A',
        logo: 'Rx',
        badge: 'pharmacy green',
        glow: 'rgba(22, 163, 74, 0.2)'
      },
      care_homes: {
        name: 'Care Home',
        file: 'care_homes.html',
        color: '#E11D48',
        logo: 'C',
        badge: 'warm rose',
        glow: 'rgba(225, 29, 72, 0.2)'
      }
    };

    function switchNiche(nicheKey) {
      const data = niches[nicheKey];
      if (!data) return;

      // Update Root styles
      document.documentElement.style.setProperty('--accent-color', data.color);
      document.documentElement.style.setProperty('--accent-glow', data.glow);

      // Update active state on buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        if (btn.getAttribute('data-niche') === nicheKey) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      // Update logo and text details
      document.getElementById('logo-icon').textContent = data.logo;
      document.getElementById('preview-title').innerHTML = `musharp ${data.name} <span>Pitch Email Outreach Preview</span>`;
      document.getElementById('theme-badge').textContent = `${data.badge} theme`;

      // Update raw link href
      document.getElementById('raw-link').href = data.file;

      // Update frames border colors
      document.getElementById('desktop-frame').style.borderColor = data.color;
      document.getElementById('mobile-frame').style.borderColor = data.color;

      // Update Iframes src
      document.getElementById('desktop-iframe').src = data.file;
      document.getElementById('mobile-iframe').src = data.file;
    }

    // Set initial frame border color style
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('desktop-frame').style.borderColor = '#0D9488';
      document.getElementById('mobile-frame').style.borderColor = '#0D9488';
    });
  </script>
</body>
</html>
